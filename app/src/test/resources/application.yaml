spring:
  datasource:
    url: jdbc:h2:mem:attestry;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    locations: classpath:db/migration-test

app:
  auth:
    token:
      provider: MEMORY
  storage:
    provider: MEMORY
    bucket: test-onboarding
  user-auth:
    invitation:
      mail:
        provider: LOG
        enabled: false
  kafka:
    enabled: false
