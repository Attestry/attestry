spring:
  config:
    activate:
      on-profile: local
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

app:
  auth:
    token:
      provider: REDIS
  bootstrap:
    platform-admin:
      enabled: true
  storage:
    provider: MINIO
    bucket: ${MINIO_BUCKET:attestry-onboarding}
    minio:
      endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
      access-key: ${MINIO_ACCESS_KEY:minioadmin}
      secret-key: ${MINIO_SECRET_KEY:minioadmin}
