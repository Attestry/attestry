spring:
  config:
    activate:
      on-profile: local
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    client-id: ${KAFKA_CLIENT_ID:attestry-local}
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP:attestry-ledger-local}

app:
  auth:
    token:
      provider: REDIS
  bootstrap:
    platform-admin:
      enabled: ${APP_BOOTSTRAP_PLATFORM_ADMIN_ENABLED:true}
  storage:
    provider: MINIO
    bucket: ${MINIO_BUCKET:attestry-onboarding}
    minio:
      endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
      access-key: ${MINIO_ACCESS_KEY:minioadmin}
      secret-key: ${MINIO_SECRET_KEY:minioadmin}
  kafka:
    client-id: ${KAFKA_CLIENT_ID:attestry-local}
    consumer-group-id: ${KAFKA_CONSUMER_GROUP:attestry-ledger-local}
    outbox:
      batch-size: ${KAFKA_OUTBOX_BATCH_SIZE:50}
      max-retries: ${KAFKA_OUTBOX_MAX_RETRIES:5}
      publish-interval-ms: ${KAFKA_OUTBOX_PUBLISH_INTERVAL_MS:2000}
  product:
    read-projection:
      backfill:
        enabled: false
