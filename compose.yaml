services:
  postgres:
    image: 'postgres:latest'
    environment:
      - 'POSTGRES_DB=mydatabase'
      - 'POSTGRES_PASSWORD=secret'
      - 'POSTGRES_USER=myuser'
    ports:
      - '5432:5432'

  minio:
    image: 'minio/minio:latest'
    command: server /data --console-address ":9001"
    environment:
      - 'MINIO_ROOT_USER=minioadmin'
      - 'MINIO_ROOT_PASSWORD=minioadmin'
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio-data:/data

  minio-init:
    image: 'minio/mc:latest'
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc alias set local http://minio:9000 minioadmin minioadmin) do echo 'waiting for minio...' && sleep 1; done;
      /usr/bin/mc mb --ignore-existing local/attestry-onboarding;
      /usr/bin/mc anonymous set private local/attestry-onboarding;
      exit 0;
      "

  redis:
    image: 'redis:7-alpine'
    ports:
      - '6379:6379'

volumes:
  minio-data:
